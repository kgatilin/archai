    - name: cloneModels
      params:
        - name: pkgs
          type:
            name: PackageModel
            package: internal/domain
            slice: true
      returns:
        - name: PackageModel
          package: internal/domain
          slice: true
      exported: false
      source_file: apply.go
      calls:
