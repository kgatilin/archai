schema: archai/v1
package: internal/apply
name: apply
layer: model_ops
functions:
    - name: Apply
      params:
        - name: d
          type:
            name: Diff
            package: internal/diff
            pointer: true
        - name: currentModels
          type:
            name: PackageModel
            package: internal/domain
            slice: true
        - name: targetModels
          type:
            name: PackageModel
            package: internal/domain
            slice: true
      returns:
        - name: PackageModel
          package: internal/domain
          slice: true
        - name: error
      exported: true
      source_file: apply.go
      doc: |
        Apply replays diff d against targetModels, using currentModels as the
        authoritative source for any symbol payload required when growing the
        target. It returns a new slice of PackageModels; inputs are not mutated.

        The diff is interpreted per diff.Compute's semantics — namely it describes
        how the CURRENT code must change to match the target — and Apply reverses
        each change against the target so that, after apply, the target snapshot
        matches the current code.

          - OpAdd    — symbol exists in target but not in current; REMOVE it from
            the target snapshot.
          - OpRemove — symbol exists in current but not in target; ADD it to the
            target snapshot (copied from currentModels).
          - OpChange — symbol exists on both sides but differs; REPLACE the target
            version with the current version.

        Unknown Op or Kind values are reported as errors. Dependencies are keyed
        by the same "<from>-><to>:<kind>" string diff.Compute emits.
      calls:
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyChange
        - to:
            package: internal/apply
            file: apply.go
            symbol: cloneModels
        - to:
            package: internal/apply
            file: apply.go
            symbol: indexMutableModels
        - to:
            package: internal/apply
            file: apply.go
            symbol: indexPackages
    - name: applyChange
      params:
        - name: c
          type:
            name: Change
            package: internal/diff
        - name: curIdx
          type:
            name: ""
            map: true
            key_type:
                name: string
            value_type:
                name: PackageModel
                package: internal/domain
        - name: tgtIdx
          type:
            name: ""
            map: true
            key_type:
                name: string
            value_type:
                name: PackageModel
                package: internal/domain
                pointer: true
      returns:
        - name: error
      exported: false
      source_file: apply.go
      doc: |
        applyChange dispatches a single Change to the right mutator. It looks up
        the package-level target PackageModel (creating one on OpAdd/OpChange when
        needed) and delegates to a kind-specific helper.
      calls:
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyConst
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyDep
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyError
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyFunction
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyInterface
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyPackage
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyStruct
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyTypeDef
        - to:
            package: internal/apply
            file: apply.go
            symbol: applyVar
        - to:
            package: internal/apply
            file: apply.go
            symbol: splitPath
    - name: applyConst
      params:
        - name: op
          type:
            name: Op
            package: internal/diff
        - name: tgt
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: cur
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: name
          type:
            name: string
      returns:
        - name: error
      exported: false
      source_file: apply.go
    - name: applyDep
      params:
        - name: op
          type:
            name: Op
            package: internal/diff
        - name: tgt
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: cur
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: key
          type:
            name: string
      returns:
        - name: error
      exported: false
      source_file: apply.go
      doc: |
        applyDep looks up the dependency by the Compute key "<from>-><to>:<kind>".
      calls:
        - to:
            package: internal/domain
            file: dependency.go
            symbol: SymbolRef.String
    - name: applyError
      params:
        - name: op
          type:
            name: Op
            package: internal/diff
        - name: tgt
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: cur
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: name
          type:
