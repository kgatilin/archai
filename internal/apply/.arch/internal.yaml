    - name: applyPackage
      params:
        - name: c
          type:
            name: Change
            package: internal/diff
        - name: curIdx
          type:
            name: ""
            map: true
            key_type:
                name: string
            value_type:
                name: PackageModel
                package: internal/domain
        - name: tgtIdx
          type:
            name: ""
            map: true
            key_type:
                name: string
            value_type:
                name: PackageModel
                package: internal/domain
                pointer: true
      returns:
        - name: error
      exported: false
      source_file: apply.go
      doc: |
        applyPackage handles OpAdd / OpRemove / OpChange on an entire package.
        OpAdd (target has it, current doesn't) => drop from target.
        OpRemove (current has it, target doesn't) => copy current package into target.
    - name: applyStruct
      params:
