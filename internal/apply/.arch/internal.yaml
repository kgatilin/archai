            package: internal/apply
            file: apply.go
            symbol: findFunction
        - to:
            package: internal/apply
            file: apply.go
            symbol: indexFunction
    - name: applyInterface
      params:
        - name: op
          type:
            name: Op
            package: internal/diff
        - name: tgt
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: cur
          type:
            name: PackageModel
            package: internal/domain
            pointer: true
        - name: name
          type:
