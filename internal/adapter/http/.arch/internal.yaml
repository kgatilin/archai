functions:
    - name: NewMultiServer
      params:
        - name: multi
          type:
            name: MultiState
            package: internal/serve
            pointer: true
      returns:
        - name: Server
          package: internal/adapter/http
          pointer: true
        - name: error
      exported: true
      source_file: server.go
      doc: |
        NewMultiServer constructs a multi-worktree Server backed by the
        given MultiState. All content routes are served under /w/{name}/*;
        legacy roots redirect to the cookie-selected (or first alphabetical)
        worktree so existing bookmarks still resolve.
      stereotype: factory
      calls:
        - to:
            package: internal/adapter/http
            file: server.go
            symbol: parseEmbedded
    - name: NewServer
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
      returns:
        - name: Server
          package: internal/adapter/http
          pointer: true
        - name: error
      exported: true
      source_file: server.go
      doc: |
        NewServer constructs a single-worktree Server backed by the given
        state. Templates are parsed eagerly so malformed templates fail at
        construction time rather than on the first request. This is the
        Mode A constructor: routes stay at their historical paths (/,
        /layers, …).
      stereotype: factory
      calls:
        - to:
            package: internal/adapter/http
            file: server.go
            symbol: parseEmbedded
    - name: applyOverlay
      params:
        - name: pkgs
          type:
            name: PackageModel
            package: internal/domain
            slice: true
        - name: cfg
          type:
            name: Config
            package: internal/overlay
            pointer: true
      returns:
        - name: PackageModel
          package: internal/domain
          slice: true
      exported: false
      source_file: packages_handler.go
      doc: |
        applyOverlay merges the overlay config into a fresh copy of the
        package list so Layer/Aggregate are populated for rendering. A nil
        overlay is fine — the input slice is returned unchanged.
      calls:
        - to:
            package: internal/overlay
            file: merge.go
            symbol: Merge
    - name: buildConfigFields
      params:
        - name: fields
          type:
            name: FieldDef
            package: internal/domain
            slice: true
      returns:
        - name: configField
          package: internal/adapter/http
          slice: true
      exported: false
      source_file: configs.go
      doc: |
        buildConfigFields renders each field with a default-value literal.
        The default mirrors synthesizeExample but is emitted per-field so
        the table can show each value inline.
      calls:
        - to:
            package: internal/adapter/http
            file: configs.go
            symbol: defaultLiteral
        - to:
            package: internal/domain
            file: method.go
            symbol: TypeRef.String
    - name: buildConfigTypes
      params:
        - name: pkg
          type:
            name: PackageModel
            package: internal/domain
        - name: cfg
          type:
            name: Config
            package: internal/overlay
            pointer: true
        - name: modulePath
          type:
            name: string
      returns:
        - name: configTypeView
          package: internal/adapter/http
          slice: true
      exported: false
      source_file: package_detail_data.go
      doc: |
        buildConfigTypes walks the overlay config list and picks out entries
        whose fully-qualified name resolves to a struct in this package.
        modulePath is the Go module path from go.mod — used to convert
        "github.com/foo/bar/internal/x.Type" into the relative path
        "internal/x" that PackageModel.Path uses.
      calls:
        - to:
            package: internal/adapter/http
            file: package_detail_data.go
            symbol: relToModule
        - to:
            package: internal/adapter/http
            file: package_detail_data.go
            symbol: splitFQTypeName
    - name: buildDiffGraph
      params:
        - name: d
          type:
            name: Diff
            package: internal/diff
            pointer: true
        - name: filter
          type:
            name: string
      returns:
        - name: graphPayload
          package: internal/adapter/http
      exported: false
      source_file: graphs.go
      doc: |
        buildDiffGraph produces a cytoscape overlay of current vs. target.
        Nodes are identified by their diff.Change.Path, colored by operation
        (add=green / remove=red / change=yellow). Edges connect parent
        packages to their changed children so the graph reveals the impact
        surface per package.
      calls:
        - to:
            package: internal/adapter/http
            file: graphs.go
            symbol: diffParentID
        - to:
            package: internal/adapter/http
            file: graphs.go
            symbol: shortNameForDiff
    - name: buildFQN
      params:
        - name: module
          type:
            name: string
        - name: pkgPath
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: string
      exported: false
      source_file: configs.go
      doc: |
        buildFQN assembles the fully-qualified name used in overlay.Configs.
        An empty module (no overlay or unspecified) falls back to just
        "{pkgPath}.{Name}".
    - name: buildGroups
      params:
        - name: d
          type:
            name: Diff
            package: internal/diff
            pointer: true
        - name: filter
          type:
            name: string
      returns:
        - name: diffGroup
          package: internal/adapter/http
          slice: true
      exported: false
      source_file: diff_targets.go
      doc: |
        buildGroups arranges d's changes into ordered op-groups suitable for
        the template. When filter is non-empty, only changes whose Kind
        matches are included.
      calls:
        - to:
            package: internal/adapter/http
            file: diff_targets.go
            symbol: formatSide
    - name: buildInbound
      params:
        - name: pkg
          type:
            name: PackageModel
            package: internal/domain
        - name: allPkgs
          type:
            name: PackageModel
            package: internal/domain
            slice: true
      returns:
        - name: inboundDep
          package: internal/adapter/http
          slice: true
      exported: false
      source_file: package_detail_data.go
      doc: |
        buildInbound walks every other package in the snapshot and collects
        dependencies that point back at pkg.
      calls:
        - to:
            package: internal/adapter/http
            file: package_detail_data.go
            symbol: containsString
    - name: buildKindFilters
      params:
        - name: d
          type:
            name: Diff
            package: internal/diff
            pointer: true
        - name: selected
          type:
            name: string
      returns:
        - name: kindFilter
          package: internal/adapter/http
          slice: true
      exported: false
      source_file: diff_targets.go
      doc: |
        buildKindFilters produces the sidebar filter list for d, marking the
        currently-selected entry. The "All" pseudo-filter is injected first.
    - name: buildLayerEdges
      params:
        - name: cfg
          type:
            name: Config
