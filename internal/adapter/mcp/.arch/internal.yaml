schema: archai/v1
package: internal/adapter/mcp
name: mcp
layer: transport
aggregate: mcp_tool_api
structs:
    - name: ClientOptions
      fields:
        - name: Endpoint
          type:
            name: string
          exported: true
        - name: HTTPClient
          type:
            name: Client
            package: net/http
            pointer: true
          exported: true
      exported: true
      source_file: client.go
      doc: |
        ClientOptions configures the thin-client MCP stdio wrapper. Endpoint
        is the base URL of the HTTP daemon (e.g. "http://127.0.0.1:47123").

        HTTPClient is optional; when nil a package-default with a 30s
        per-request timeout is used.
      stereotype: value
    - name: PackageSummary
      fields:
        - name: Path
          type:
            name: string
          exported: true
          tag: json:"path"
        - name: Name
          type:
            name: string
          exported: true
          tag: json:"name"
        - name: Layer
          type:
            name: string
          exported: true
          tag: json:"layer,omitempty"
        - name: InterfaceCount
          type:
            name: int
          exported: true
          tag: json:"interface_count"
        - name: StructCount
          type:
            name: int
          exported: true
          tag: json:"struct_count"
        - name: FunctionCount
          type:
            name: int
          exported: true
          tag: json:"function_count"
      exported: true
      source_file: tools.go
      doc: |
        PackageSummary is the minimal record returned by list_packages. The
        summary is intentionally small so agents can decide which package to
        drill into via get_package without paying for the full payload.
      stereotype: value
    - name: RPCError
      fields:
        - name: Code
          type:
            name: int
          exported: true
          tag: json:"code"
        - name: Message
          type:
            name: string
          exported: true
          tag: json:"message"
        - name: Data
          type:
            name: any
          exported: true
          tag: json:"data,omitempty"
      exported: true
      source_file: protocol.go
      doc: |
        RPCError is the error object defined by JSON-RPC 2.0.
      stereotype: value
    - name: Request
      fields:
        - name: JSONRPC
          type:
            name: string
          exported: true
          tag: json:"jsonrpc"
        - name: ID
          type:
            name: RawMessage
            package: encoding/json
          exported: true
          tag: json:"id,omitempty"
        - name: Method
          type:
            name: string
          exported: true
          tag: json:"method"
        - name: Params
          type:
            name: RawMessage
            package: encoding/json
          exported: true
          tag: json:"params,omitempty"
      exported: true
      source_file: protocol.go
      doc: |
        Request is an incoming JSON-RPC 2.0 request or notification. ID is
        kept as a RawMessage so we can echo it back verbatim (clients may use
        numbers or strings interchangeably).
      stereotype: value
    - name: Response
      fields:
        - name: JSONRPC
          type:
            name: string
          exported: true
          tag: json:"jsonrpc"
        - name: ID
          type:
            name: RawMessage
            package: encoding/json
          exported: true
          tag: json:"id,omitempty"
        - name: Result
          type:
            name: interface{}
          exported: true
          tag: json:"result,omitempty"
        - name: Error
          type:
            name: RPCError
            package: internal/adapter/mcp
            pointer: true
          exported: true
          tag: json:"error,omitempty"
      exported: true
      source_file: protocol.go
      doc: |
        Response is a JSON-RPC 2.0 response. Exactly one of Result / Error is
        set on the wire; Response uses pointers so omitempty elides the other.
      stereotype: value
    - name: ToolDefinition
      fields:
        - name: Name
          type:
            name: string
          exported: true
          tag: json:"name"
        - name: Description
          type:
            name: string
          exported: true
          tag: json:"description"
        - name: InputSchema
          type:
            name: any
          exported: true
          tag: json:"inputSchema"
      exported: true
      source_file: tools.go
      doc: |
        ToolDefinition describes a single MCP tool exposed via tools/list.
        InputSchema is a JSON Schema object; we keep it as an any so each
        tool can define its own shape without a shared struct.
      stereotype: value
    - name: ToolResult
      fields:
        - name: Content
          type:
            name: ToolResultContent
            package: internal/adapter/mcp
            slice: true
          exported: true
          tag: json:"content"
        - name: IsError
          type:
            name: bool
          exported: true
          tag: json:"isError,omitempty"
      exported: true
      source_file: tools.go
      doc: |
        ToolResult is the payload returned by tools/call. IsError is a hint
        for clients — JSON-RPC errors are used for protocol-level failures
        (unknown tool etc.) while tool-level errors (package not found) are
        reported via IsError + a text message so the model can see them.
      stereotype: value
    - name: ToolResultContent
      fields:
        - name: Type
          type:
            name: string
          exported: true
          tag: json:"type"
        - name: Text
          type:
            name: string
          exported: true
          tag: json:"text"
      exported: true
      source_file: tools.go
      doc: |
        ToolResultContent is one "content" item returned by tools/call. We
        only emit text blocks; binary/resource blocks are out of scope for
        the current tool surface.
      stereotype: value
    - name: ValidateResult
      fields:
        - name: OK
          type:
            name: bool
          exported: true
          tag: json:"ok"
        - name: Target
          type:
            name: string
          exported: true
          tag: json:"target"
        - name: Violations
          type:
            name: Change
            package: internal/diff
            slice: true
          exported: true
          tag: json:"violations"
      exported: true
      source_file: tools.go
      doc: |
        ValidateResult is the structured payload returned by the `validate`
        tool: ok=true when no drift, otherwise the list of Change entries
        describing violations.
      stereotype: value
    - name: applyDiffArgs
      fields:
        - name: PatchYAML
          type:
            name: string
          exported: true
          tag: json:"patch_yaml"
        - name: Target
          type:
            name: string
          exported: true
          tag: json:"target"
      exported: false
      source_file: tools.go
      doc: |
        applyDiffArgs is the input schema for the apply_diff tool.
      stereotype: value
    - name: diffArgs
      fields:
        - name: Target
          type:
            name: string
          exported: true
          tag: json:"target"
      exported: false
      source_file: tools.go
      doc: |
        diffArgs is the input schema for the diff tool.
      stereotype: value
    - name: extractArgs
      fields:
        - name: Paths
          type:
            name: string
            slice: true
          exported: true
          tag: json:"paths"
      exported: false
      source_file: tools.go
      doc: |
        extractArgs is the input schema for the extract tool.
      stereotype: value
    - name: getPackageArgs
      fields:
        - name: Path
          type:
            name: string
          exported: true
          tag: json:"path"
      exported: false
      source_file: tools.go
      doc: |
        getPackageArgs is the input schema for the get_package tool.
      stereotype: value
    - name: initializeResult
      fields:
        - name: ProtocolVersion
          type:
            name: string
          exported: true
          tag: json:"protocolVersion"
        - name: Capabilities
          type:
            name: ""
            map: true
            key_type:
                name: string
            value_type:
                name: any
          exported: true
          tag: json:"capabilities"
        - name: ServerInfo
          type:
            name: serverInfo
            package: internal/adapter/mcp
          exported: true
          tag: json:"serverInfo"
      exported: false
      source_file: protocol.go
      doc: |
        initializeResult is the payload returned for the initialize request.
        We advertise the tools capability (the bag is empty — MCP defines no
        required fields inside it yet).
      stereotype: value
    - name: lockTargetArgs
      fields:
        - name: ID
          type:
            name: string
          exported: true
          tag: json:"id"
        - name: Description
          type:
            name: string
          exported: true
          tag: json:"description"
      exported: false
      source_file: tools.go
      doc: |
        lockTargetArgs is the input schema for the lock_target tool.
      stereotype: value
    - name: serverInfo
      fields:
        - name: Name
          type:
            name: string
          exported: true
          tag: json:"name"
        - name: Version
          type:
            name: string
          exported: true
          tag: json:"version"
      exported: false
      source_file: protocol.go
      doc: |
        serverInfo is returned from initialize so clients know who they're
        talking to.
      stereotype: value
    - name: setCurrentTargetArgs
      fields:
        - name: ID
          type:
            name: string
          exported: true
          tag: json:"id"
      exported: false
      source_file: tools.go
      doc: |
        setCurrentTargetArgs is the input schema for the set_current_target tool.
      stereotype: value
    - name: toolsCallParams
      fields:
        - name: Name
          type:
            name: string
          exported: true
          tag: json:"name"
        - name: Arguments
          type:
            name: RawMessage
            package: encoding/json
          exported: true
          tag: json:"arguments"
      exported: false
      source_file: stdio.go
      doc: |
        toolsCallParams is the shape of tools/call params per the MCP spec.
      stereotype: value
    - name: validateArgs
      fields:
        - name: Target
          type:
            name: string
          exported: true
          tag: json:"target"
      exported: false
      source_file: tools.go
      doc: |
        validateArgs is the input schema for the validate tool.
      stereotype: value
functions:
    - name: Dispatch
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: name
          type:
            name: string
        - name: rawArgs
          type:
            name: RawMessage
            package: encoding/json
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: true
      source_file: tools.go
      doc: |
        Dispatch routes a tools/call invocation to the matching handler.
        Unknown tool names surface as JSON-RPC method-not-found errors; known
        tools all return ToolResult (possibly with IsError=true when inputs
        are invalid or on-disk operations fail).
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleApplyDiff
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleDiff
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleExtract
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleGetPackage
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleListPackages
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleListTargets
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleLockTarget
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleSetCurrentTarget
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: handleValidate
    - name: Serve
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
      returns:
        - name: error
      exported: true
      source_file: stdio.go
      doc: |
        Serve runs the MCP stdio transport: it reads line-delimited JSON-RPC
        2.0 messages from stdin, dispatches them against state, and writes
        responses back to stdout. Diagnostic logs go to stderr.

        Serve returns when stdin is closed (io.EOF) or ctx is cancelled.
        It is safe to call concurrently with state mutations — all reads go
        through serve.State.Snapshot().
      calls:
        - to:
            package: internal/adapter/mcp
            file: stdio.go
            symbol: serveIO
    - name: ServeClient
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: opts
          type:
            name: ClientOptions
            package: internal/adapter/mcp
      returns:
        - name: error
      exported: true
      source_file: client.go
      doc: |
        ServeClient runs the MCP stdio transport in thin-client mode. It
        reads JSON-RPC messages from stdin, forwards tools/call invocations
        to the HTTP daemon at opts.Endpoint, and writes responses back to
        stdout. initialize, notifications/initialized and tools/list are
        handled locally (ToolDefinitions matches the daemon's set by
        construction).

        ServeClient returns when stdin is closed (io.EOF) or ctx is
        cancelled.
      calls:
        - to:
            package: internal/adapter/mcp
            file: client.go
            symbol: serveClientIO
    - name: ToolDefinitions
      returns:
        - name: ToolDefinition
          package: internal/adapter/mcp
          slice: true
      exported: true
      source_file: tools.go
      doc: |
        ToolDefinitions returns the nine tools we advertise. Kept as a
        function rather than a var so the JSON-Schema maps don't become
        mutable package state.
    - name: collectYAMLFiles
      params:
        - name: root
          type:
            name: string
      returns:
        - name: string
          slice: true
        - name: error
      exported: false
      source_file: tools.go
      doc: |
        collectYAMLFiles returns every *.yaml / *.yml file under root.
    - name: dispatchToolsCall
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: req
          type:
            name: Request
            package: internal/adapter/mcp
        - name: writeLine
          type:
            name: func(internal/adapter/mcp.Response) error
        - name: errOut
          type:
            name: Writer
            package: io
      returns:
        - name: error
      exported: false
      source_file: stdio.go
      doc: |
        dispatchToolsCall extracts name+arguments from the request, invokes
        the tool, and writes the response.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: Dispatch
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newErrorResponse
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newResponse
    - name: errorResult
      params:
        - name: msg
          type:
            name: string
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
      exported: false
      source_file: tools.go
      doc: |
        errorResult wraps a human-readable message as an IsError=true tool
        result. Used for input validation failures the agent can surface.
    - name: forwardToolsCall
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: httpClient
          type:
            name: Client
            package: net/http
            pointer: true
        - name: endpoint
          type:
            name: string
        - name: req
          type:
            name: Request
            package: internal/adapter/mcp
        - name: writeLine
          type:
            name: func(internal/adapter/mcp.Response) error
        - name: errOut
          type:
            name: Writer
            package: io
      returns:
        - name: error
      exported: false
      source_file: client.go
      doc: |
        forwardToolsCall POSTs the raw params to /api/mcp/tools/call and
        writes the daemon's response (a ToolResult) back to the MCP client.
        Daemon-side RPC errors are surfaced as JSON-RPC errors; transport
        failures (connection refused, timeout) are reported as internal
        errors so the MCP client can retry.
      calls:
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newErrorResponse
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newResponse
    - name: handleApplyDiff
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: rawArgs
          type:
            name: RawMessage
            package: encoding/json
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
        handleApplyDiff parses the patch YAML, loads current+target models,
        runs apply.Apply and rewrites the target's model/ tree on disk.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: errorResult
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: loadTargetModelsFromDisk
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: requireRoot
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: resolveTargetID
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: textResult
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: unmarshalArgs
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: validatePatch
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: writeTargetModelsToDisk
        - to:
            package: internal/apply
            file: apply.go
            symbol: Apply
        - to:
            package: internal/serve
            file: state.go
            symbol: State.Snapshot
    - name: handleClientLine
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: httpClient
          type:
            name: Client
            package: net/http
            pointer: true
        - name: endpoint
          type:
            name: string
        - name: line
          type:
            name: byte
            slice: true
        - name: writeLine
          type:
            name: func(internal/adapter/mcp.Response) error
        - name: errOut
          type:
            name: Writer
            package: io
      returns:
        - name: error
      exported: false
      source_file: client.go
      doc: |
        handleClientLine dispatches a single incoming line. initialize,
        tools/list and ping are answered locally; tools/call is forwarded
        via forwardToolsCall.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: ToolDefinitions
        - to:
            package: internal/adapter/mcp
            file: client.go
            symbol: forwardToolsCall
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newErrorResponse
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newInitializeResult
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newResponse
    - name: handleDiff
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: rawArgs
          type:
            name: RawMessage
            package: encoding/json
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
        handleDiff loads current (from snapshot) and target (from disk) and
        returns the structured Diff as JSON.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: errorResult
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: loadTargetModelsFromDisk
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: requireRoot
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: resolveTargetID
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: textResult
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: unmarshalArgs
        - to:
            package: internal/diff
            file: compute.go
            symbol: Compute
        - to:
            package: internal/serve
            file: state.go
            symbol: State.Snapshot
    - name: handleExtract
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: rawArgs
          type:
            name: RawMessage
            package: encoding/json
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
        handleExtract returns the (optionally filtered) package list. An
        empty Paths slice means "return everything"; an unknown path is not
        an error — it just contributes nothing.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: snapshotOrEmpty
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: textResult
    - name: handleGetPackage
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: rawArgs
          type:
            name: RawMessage
            package: encoding/json
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
        handleGetPackage returns a single PackageModel. Missing/empty paths
        and unknown packages come back as IsError=true tool results (not
        JSON-RPC errors) so the model can see the message and recover.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: errorResult
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: snapshotOrEmpty
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: textResult
    - name: handleLine
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: line
          type:
            name: byte
            slice: true
        - name: writeLine
          type:
            name: func(internal/adapter/mcp.Response) error
        - name: errOut
          type:
            name: Writer
            package: io
      returns:
        - name: error
      exported: false
      source_file: stdio.go
      doc: |
        handleLine parses a single incoming line and emits exactly one
        response (unless the message is a notification — has no id — in
        which case nothing is written).
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: ToolDefinitions
        - to:
            package: internal/adapter/mcp
            file: stdio.go
            symbol: dispatchToolsCall
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newErrorResponse
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newInitializeResult
        - to:
            package: internal/adapter/mcp
            file: protocol.go
            symbol: newResponse
    - name: handleListPackages
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
        handleListPackages returns the minimal per-package summary.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: snapshotOrEmpty
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: textResult
    - name: handleListTargets
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
        handleListTargets returns []TargetMeta for every target under
        .arch/targets/, sorted by id.
      calls:
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: errorResult
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: requireRoot
        - to:
            package: internal/adapter/mcp
            file: tools.go
            symbol: textResult
        - to:
            package: internal/target
            file: storage.go
            symbol: List
    - name: handleLockTarget
      params:
        - name: state
          type:
            name: State
            package: internal/serve
            pointer: true
        - name: rawArgs
          type:
            name: RawMessage
            package: encoding/json
      returns:
        - name: ToolResult
          package: internal/adapter/mcp
        - name: RPCError
          package: internal/adapter/mcp
          pointer: true
      exported: false
      source_file: tools.go
      doc: |
