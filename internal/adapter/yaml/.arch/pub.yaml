functions:
    - name: MarshalPackage
      params:
        - name: model
          type:
            name: PackageModel
            package: internal/domain
        - name: format
          type:
            name: string
      returns:
        - name: byte
          slice: true
        - name: error
      exported: true
      source_file: marshal.go
      doc: |
        MarshalPackage serializes a single PackageModel to bytes in the
        requested format ("yaml" or "json"). The output matches the on-disk
        YAML schema produced by the ModelWriter (same field names and nesting),
        so callers can round-trip a dumped package back through the YAML
        reader.

        JSON output uses the same field names as YAML (snake_case where
        applicable) by routing the spec through a generic map, which keeps
        the two formats in lock-step without duplicate struct tags.
      calls:
        - to:
            package: internal/adapter/yaml
            file: marshal.go
            symbol: normalizeForJSON
        - to:
            package: internal/adapter/yaml
            file: convert.go
            symbol: toSpec
    - name: NewReader
      returns:
        - name: ModelReader
          package: internal/service
      exported: true
      source_file: reader.go
      doc: |
        NewReader creates a new YAML ModelReader.
      stereotype: factory
    - name: NewWriter
      returns:
        - name: ModelWriter
          package: internal/service
      exported: true
      source_file: writer.go
      doc: |
        NewWriter creates a new YAML ModelWriter.
      stereotype: factory
