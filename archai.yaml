# Self-hosted archai overlay.
#
# This file is intentionally a real project config for archai itself. The
# generated per-package `.arch/` files in this repository are produced from
# this overlay, so the project demonstrates the tool on its own codebase.
#
# Architecture shape (post-#82):
#   - The domain is a single bounded context, `model`, that owns the
#     extracted package model and the operations performed over it
#     (overlay, diff, apply, sequence). Everything else is an adapter.
#   - Inbound adapters drive the model from the outside (Go source
#     extractor, YAML overlay loader). Outbound adapters render the
#     model to other formats (D2 diagrams, dashboard HTML/JS).
#     Bidirectional adapters serve and accept commands at runtime
#     (HTTP server, MCP server).
#   - Layer rules still describe permitted package-level dependencies
#     between the four coarse architecture layers.

module: github.com/kgatilin/archai

layers:
  domain:
    - internal/domain/...
  application:
    - internal/service/...
    - internal/overlay/...
    - internal/policy/...
    - internal/diff/...
    - internal/apply/...
    - internal/sequence/...
  infrastructure:
    - internal/serve/...
    - internal/target/...
    - internal/worktree/...
    - internal/buildinfo/...
    - internal/plugin/...
    - internal/plugins/...
  adapters:
    - cmd/...
    - internal/adapter/http/...
    - internal/adapter/mcp/...
    - internal/adapter/d2/...
    - internal/adapter/golang/...
    - internal/adapter/yaml/...

layer_rules:
  domain:         []
  application:    [domain]
  infrastructure: [application, domain, adapters]
  adapters:       [infrastructure, application, domain]

aggregates:
  domain:
    root: "github.com/kgatilin/archai/internal/domain.PackageModel"
  model_ops:
    root: "github.com/kgatilin/archai/internal/overlay.Config"

bounded_contexts:
  model:
    name: "Model"
    description: "The package model and the operations performed over it (overlay, diff, apply, sequence)."
    aggregates:
      - domain
      - model_ops

adapters:
  go_extractor:
    name: "Go Extractor"
    direction: inbound
    description: "Reads Go source and extracts the package model."
    packages:
      - internal/adapter/golang/...
  yaml_overlay:
    name: "YAML Overlay"
    direction: inbound
    description: "Loads archai.yaml and per-package overlay fragments."
    packages:
      - internal/adapter/yaml/...
  d2_emitter:
    name: "D2 Emitter"
    direction: outbound
    description: "Renders the model and overlay into D2 diagram source."
    packages:
      - internal/adapter/d2/...
  dashboard:
    name: "Dashboard"
    direction: outbound
    description: "HTML/JS dashboard that visualises the model in a browser."
    packages:
      - internal/adapter/http/...
  mcp_server:
    name: "MCP Server"
    direction: bidirectional
    description: "Model Context Protocol surface for IDE/agent tooling."
    packages:
      - internal/adapter/mcp/...
  http_server:
    name: "HTTP Server"
    direction: bidirectional
    description: "HTTP API and dashboard host process."
    packages:
      - internal/serve/...

configs: []

# Dependency policy (see docs/features/dependency-policy/design.md).
#
# This dogfoods the policy engine on archai itself. It encodes archai's own
# hexagonal invariants from CLAUDE.md:
#   - rule 4: "Domain models are data containers — no behavior, no external
#     dependencies", so the domain must not depend on any other layer.
#   - rule 5: "Adapters depend on domain — never the reverse", so the domain
#     must never reach an adapter, even transitively.
#
# It runs in blacklist mode (deny_by_default: false) so it states invariants
# without demanding a full allow-list; flip deny_by_default to true (and add
# the allow edges) to enforce total dependency inversion.
policy:
  deny_by_default: false
  forbid:
    - "@domain !-> @application, @infrastructure, @adapters"
  reachability:
    - "@domain !~> @adapters"
    - "@domain !~> @infrastructure"

serve:
  http_addr: "0.0.0.0:47823"
