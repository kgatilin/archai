        package: internal/sequence
        file: sequence.go
        symbol: Node
      to:
        package: internal/domain
        symbol: SymbolRef
      kind: uses
      through_exported: true
    - from:
        package: internal/sequence
        file: sequence.go
        symbol: Node
      to:
        package: internal/sequence
        file: sequence.go
        symbol: Node
      kind: uses
      through_exported: true
    - from:
