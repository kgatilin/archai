        symbol: ParseTarget
      to:
        package: internal/domain
        symbol: SymbolRef
      kind: returns
      through_exported: true
    - from:
        package: internal/sequence
        file: format_d2.go
        symbol: actorName
      to:
        package: internal/domain
        symbol: SymbolRef
      kind: uses
    - from:
        package: internal/sequence
        file: build.go
        symbol: buildIndex
      to:
        package: internal/domain
        symbol: PackageModel
      kind: uses
    - from:
        package: internal/sequence
        file: build.go
        symbol: buildIndex
      to:
        package: internal/sequence
        file: build.go
        symbol: index
      kind: returns
    - from:
        package: internal/sequence
        file: build.go
        symbol: buildNode
      to:
        package: internal/sequence
        file: build.go
        symbol: index
      kind: uses
    - from:
        package: internal/sequence
        file: build.go
