schema: archai/v1
package: internal/worktree
name: worktree
layer: storage
aggregate: worktree_runtime
structs:
    - name: Entry
      fields:
        - name: Path
          type:
            name: string
          exported: true
        - name: Name
          type:
            name: string
          exported: true
        - name: Branch
          type:
            name: string
          exported: true
        - name: Head
          type:
            name: string
          exported: true
        - name: Bare
          type:
            name: bool
          exported: true
      exported: true
      source_file: discover.go
      doc: |
        Entry describes a single git worktree as discovered by
        `git worktree list --porcelain`. Path is the absolute filesystem
        path to the worktree root; Name is filepath.Base(Path). Branch is
        the current branch (may be empty for detached HEAD). Bare is true
        for bare repositories (these are skipped by Discover since they
        have no working tree).
      stereotype: value
    - name: LiveDaemon
      fields:
        - name: Worktree
          type:
            name: string
          exported: true
        - name: Record
          type:
            name: ServeRecord
            package: internal/worktree
          exported: true
        - name: StartedAt
          type:
            name: Time
            package: time
          exported: true
      exported: true
      source_file: worktree.go
      doc: |
        LiveDaemon pairs a worktree name with the decoded serve.json record
        and its mtime (used as a best-effort uptime source). Only daemons
        whose PID responds to signal 0 (i.e. the process exists) are
        returned by ListDaemons.
      stereotype: value
    - name: ServeRecord
      fields:
        - name: PID
          type:
            name: int
          exported: true
          tag: json:"pid"
        - name: HTTPAddr
          type:
            name: string
          exported: true
          tag: json:"http_addr"
        - name: StartedAt
          type:
            name: string
          exported: true
          tag: json:"started_at"
      exported: true
      source_file: worktree.go
      doc: |
        ServeRecord is the JSON payload written to serve.json by a running
        daemon so peer tools (`archai where`, `archai list-daemons`) can
        discover live daemons without probing ports.
      stereotype: value
functions:
    - name: CurrentPath
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: string
      exported: true
      source_file: worktree.go
      doc: |
        CurrentPath returns the absolute path to this worktree's CURRENT
        pointer.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Dir
    - name: Dir
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: string
      exported: true
      source_file: worktree.go
      doc: |
        Dir returns the per-worktree state directory
        (.arch/.worktree/<name>/) under projectRoot. The directory is NOT
        created by this function.
    - name: Discover
      params:
        - name: projectRoot
          type:
            name: string
      returns:
        - name: Entry
          package: internal/worktree
          slice: true
        - name: error
      exported: true
      source_file: discover.go
      doc: |
        Discover runs `git worktree list --porcelain` from projectRoot and
        returns the parsed entries, excluding bare repos. On success the
        result is sorted by Name. When git is unavailable or projectRoot is
        not inside a git repo, Discover returns a single synthetic entry
        matching projectRoot so callers can still serve the current
        directory without a git repo.
      calls:
        - to:
            package: internal/worktree
            file: discover.go
            symbol: ParseWorktreeList
    - name: LegacyCurrentPath
      params:
        - name: projectRoot
          type:
            name: string
      returns:
        - name: string
      exported: true
      source_file: worktree.go
      doc: |
        LegacyCurrentPath returns the pre-M9 CURRENT location under
        .arch/targets/CURRENT. Kept as a migration fallback.
    - name: ListDaemons
      params:
        - name: projectRoot
          type:
            name: string
      returns:
        - name: LiveDaemon
          package: internal/worktree
          slice: true
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        ListDaemons scans .arch/.worktree/*/serve.json under projectRoot and
        returns records whose PID still refers to a live process. Stale
        records (process exited without cleanup) are skipped. The result is
        sorted by worktree name.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: PIDAlive
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: readServeFile
    - name: Name
      params:
        - name: projectRoot
          type:
            name: string
      returns:
        - name: string
      exported: true
      source_file: worktree.go
      doc: |
        Name returns the worktree name for projectRoot. It invokes
        `git -C <projectRoot> rev-parse --show-toplevel` and takes the base
        name; when git is unavailable or the directory is not a git repo, it
        falls back to filepath.Base(projectRoot).
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: gitTopLevel
    - name: PIDAlive
      params:
        - name: pid
          type:
            name: int
      returns:
        - name: bool
      exported: true
      source_file: worktree.go
      doc: |
        PIDAlive reports whether pid refers to a process we can signal (i.e.
        the process exists and is visible to this user). A zero/negative pid
        is treated as dead.
    - name: ParseWorktreeList
      params:
        - name: output
          type:
            name: string
      returns:
        - name: Entry
          package: internal/worktree
          slice: true
        - name: error
      exported: true
      source_file: discover.go
      doc: |
        ParseWorktreeList parses the porcelain output of
        `git worktree list --porcelain`. Each record is terminated by a
        blank line; fields are whitespace-separated "key value" pairs with
        a leading line of "worktree <path>". The "bare" and "detached"
        lines have no value. Unknown keys are ignored.
    - name: ReadCurrent
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: string
        - name: bool
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        ReadCurrent reads the active target id for the given worktree. When
        .arch/.worktree/<name>/CURRENT is missing, it falls back to the
        legacy .arch/targets/CURRENT location; when neither exists, it
        returns an empty id and no error. The second return value is true
        when the legacy path was used (callers log a deprecation warning on
        the first such read).
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: CurrentPath
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: LegacyCurrentPath
    - name: ReadServe
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: ServeRecord
          package: internal/worktree
          pointer: true
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        ReadServe reads this worktree's serve.json. Returns (nil, nil) when
        the file does not exist.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: ServePath
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: readServeFile
    - name: RemoveCurrent
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        RemoveCurrent deletes the per-worktree CURRENT pointer. A missing
        file is not an error.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: CurrentPath
    - name: RemoveServe
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        RemoveServe deletes this worktree's serve.json. A missing file is
        not an error.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: ServePath
    - name: ServePath
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
      returns:
        - name: string
      exported: true
      source_file: worktree.go
      doc: |
        ServePath returns the absolute path to this worktree's serve.json.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Dir
    - name: WriteCurrent
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
        - name: id
          type:
            name: string
      returns:
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        WriteCurrent sets the active target id for the given worktree. The
        file is written atomically (temp file + rename).
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: CurrentPath
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Dir
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: atomicWrite
    - name: WriteServe
      params:
        - name: projectRoot
          type:
            name: string
        - name: name
          type:
            name: string
        - name: rec
          type:
            name: ServeRecord
            package: internal/worktree
      returns:
        - name: error
      exported: true
      source_file: worktree.go
      doc: |
        WriteServe writes rec to .arch/.worktree/<name>/serve.json atomically.
        The containing directory is created if necessary.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Dir
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: ServePath
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: atomicWrite
dependencies:
    - from:
        package: internal/worktree
        file: worktree.go
        symbol: LiveDaemon
      to:
        package: internal/worktree
        file: worktree.go
        symbol: ServeRecord
      kind: uses
      through_exported: true
    - from:
        package: internal/worktree
        file: worktree.go
        symbol: LiveDaemon
      to:
        package: time
        symbol: Time
        external: true
      kind: uses
      through_exported: true
    - from:
        package: internal/worktree
        file: discover.go
        symbol: Discover
      to:
        package: internal/worktree
        file: discover.go
        symbol: Entry
      kind: returns
      through_exported: true
    - from:
        package: internal/worktree
        file: worktree.go
        symbol: ListDaemons
      to:
        package: internal/worktree
        file: worktree.go
        symbol: LiveDaemon
      kind: returns
      through_exported: true
    - from:
        package: internal/worktree
        file: discover.go
        symbol: ParseWorktreeList
      to:
        package: internal/worktree
        file: discover.go
        symbol: Entry
      kind: returns
      through_exported: true
    - from:
        package: internal/worktree
        file: worktree.go
        symbol: ReadServe
      to:
        package: internal/worktree
        file: worktree.go
        symbol: ServeRecord
      kind: returns
      through_exported: true
    - from:
        package: internal/worktree
        file: worktree.go
        symbol: WriteServe
      to:
        package: internal/worktree
        file: worktree.go
        symbol: ServeRecord
      kind: uses
      through_exported: true
