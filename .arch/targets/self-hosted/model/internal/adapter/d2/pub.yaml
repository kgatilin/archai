schema: archai/v1
package: internal/adapter/d2
name: d2
layer: source_adapter
functions:
    - name: NewReader
      returns:
        - name: ModelReader
          package: internal/service
      exported: true
      source_file: reader.go
      doc: |
        NewReader creates a new D2 diagram reader that implements service.ModelReader.
      stereotype: factory
    - name: NewWriter
      returns:
        - name: ModelWriter
          package: internal/service
      exported: true
      source_file: writer.go
      doc: |
        NewWriter creates a new D2 diagram writer that implements service.ModelWriter.
      stereotype: factory
constants:
