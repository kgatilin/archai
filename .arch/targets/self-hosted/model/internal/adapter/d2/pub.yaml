errors:
    - name: ErrEmptyDiagram
      message: D2 file is empty or contains no meaningful content
      exported: true
      source_file: reader.go
      doc: |
        Error definitions for the D2 reader.
    - name: ErrInvalidLabel
      message: package container has invalid or missing label
      exported: true
      source_file: reader.go
      doc: |
        Error definitions for the D2 reader.
    - name: ErrNoPackages
      message: no package containers found in D2 file
      exported: true
      source_file: reader.go
      doc: |
        Error definitions for the D2 reader.
dependencies:
    - from:
        package: internal/adapter/d2
        file: reader.go
        symbol: NewReader
      to:
        package: internal/service
        symbol: ModelReader
      kind: returns
      through_exported: true
    - from:
        package: internal/adapter/d2
        file: writer.go
        symbol: NewWriter
      to:
