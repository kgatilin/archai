      doc: |
        Watcher wraps an fsnotify.Watcher with a debounced event channel.
        Events arriving within Debounce of one another are coalesced into a
        single batch and delivered to the handler.
functions:
    - name: AutoStartDaemon
      params:
        - name: opts
          type:
            name: AutoStartOptions
            package: internal/serve
      returns:
        - name: ServeRecord
          package: internal/worktree
          pointer: true
        - name: error
      exported: true
      source_file: autostart.go
      doc: |
        AutoStartDaemon spawns `archai serve --http <addr>` as a detached
        child process and waits until its serve.json record appears on disk
        and the PID is alive. Returns the discovered record on success. The
        child is intentionally NOT attached to the parent's process group so
        it survives when the MCP stdio wrapper exits — callers who want to
        tear the daemon down should signal it by PID.

        A file lock at .arch/.worktree/<name>/autostart.lock serializes
        concurrent callers. The sequence under the lock is:

         1. re-check serve.json (another process may have won the race)
         2. if still no live daemon, spawn one
         3. poll for serve.json to confirm the child registered

        This prevents two simultaneous MCP clients in the same worktree from
        spawning two daemons where the second overwrites the first's
        serve.json and leaves the first daemon as an orphaned listener.
      calls:
        - to:
            package: internal/serve
            file: autostart_unix.go
            symbol: acquireAutoStartLock
        - to:
            package: internal/serve
            file: autostart_unix.go
            symbol: detachProcess
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Name
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: PIDAlive
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: ReadServe
    - name: DefaultStateLoader
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: _
          type:
            name: string
        - name: path
          type:
            name: string
      returns:
        - name: State
          package: internal/serve
          pointer: true
        - name: error
      exported: true
      source_file: multistate.go
      doc: |
        DefaultStateLoader is the production StateLoader used when
        NewMultiState is called without one. It builds a fresh State
        anchored at path and loads the full Go + overlay + target model.
      calls:
        - to:
            package: internal/serve
            file: state.go
            symbol: NewState
        - to:
            package: internal/serve
            file: state.go
            symbol: State.Load
    - name: DiscoverDaemon
      params:
        - name: projectRoot
          type:
            name: string
      returns:
        - name: ServeRecord
          package: internal/worktree
          pointer: true
        - name: string
        - name: error
      exported: true
      source_file: autostart.go
      doc: |
        DiscoverDaemon looks up the running daemon record for the worktree
        containing projectRoot. Returns the parsed record (nil when no live
        daemon is registered) and the worktree name used for disk lookups.
        A stale record (process no longer alive) is treated the same as
        "no record" — the caller can then auto-start a fresh daemon.
      calls:
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Name
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: PIDAlive
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: ReadServe
    - name: NewMultiState
      params:
        - name: projectRoot
          type:
            name: string
        - name: loader
          type:
            name: StateLoader
            package: internal/serve
      returns:
        - name: MultiState
          package: internal/serve
          pointer: true
      exported: true
      source_file: multistate.go
      doc: |
        NewMultiState constructs a MultiState rooted at projectRoot, using
        loader to materialize per-worktree States on first access. Pass
        DefaultStateLoader for normal daemon use; lightweight alternatives
        are useful for transport-level tests that want to assert lazy
        behaviour without invoking the Go reader.

        The initial worktree list is populated by Refresh(); callers are
        expected to invoke Refresh() once before serving requests.
      stereotype: factory
    - name: NewState
      params:
        - name: root
          type:
            name: string
      returns:
        - name: State
          package: internal/serve
          pointer: true
      exported: true
      source_file: state.go
      doc: |
        NewState returns an empty State rooted at root. Callers must invoke
        Load before querying the state.
      stereotype: factory
      calls:
        - to:
            package: internal/adapter/golang
            file: reader.go
            symbol: NewReader
    - name: NewWatcher
      params:
        - name: root
          type:
            name: string
        - name: debounce
          type:
            name: Duration
            package: time
      returns:
        - name: Watcher
          package: internal/serve
          pointer: true
        - name: error
      exported: true
      source_file: watcher.go
      doc: |
        NewWatcher creates a fsnotify-backed Watcher rooted at root. The
        watcher recursively adds every directory under root that passes
        skipDir. Debounce defaults to DefaultDebounce when zero.
      stereotype: factory
      calls:
        - to:
            package: internal/serve
            file: watcher.go
            symbol: Watcher.addTree
    - name: Serve
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: opts
          type:
            name: Options
            package: internal/serve
      returns:
        - name: error
      exported: true
      source_file: daemon.go
      doc: |
        Serve runs the daemon: it builds the in-memory model, starts the
        fsnotify watcher, wires stub transports, and blocks until ctx is
        cancelled. Callers are expected to bridge SIGINT/SIGTERM into ctx.
      calls:
        - to:
            package: internal/adapter/http
            file: server.go
            symbol: Server.Serve
          via: internal/serve.HTTPTransport
        - to:
            package: internal/adapter/http
            file: server.go
            symbol: Server.SetActivityObserver
          via: internal/serve.ActivityAware
        - to:
            package: internal/serve
            file: multistate.go
            symbol: MultiState.Close
        - to:
            package: internal/serve
            file: multistate.go
            symbol: MultiState.Names
        - to:
            package: internal/serve
            file: multistate.go
            symbol: MultiState.SetWatcherHook
        - to:
            package: internal/serve
            file: state.go
            symbol: NewState
        - to:
            package: internal/serve
            file: watcher.go
            symbol: NewWatcher
        - to:
            package: internal/serve
            file: state.go
            symbol: State.Load
        - to:
            package: internal/serve
            file: state.go
            symbol: State.Snapshot
        - to:
            package: internal/serve
            file: watcher.go
            symbol: Watcher.Close
        - to:
            package: internal/serve
            file: watcher.go
            symbol: Watcher.Run
        - to:
            package: internal/serve
            file: daemon.go
            symbol: buildHandler
        - to:
            package: internal/serve
            file: daemon.go
            symbol: multiWatcherHook
        - to:
            package: internal/serve
            file: daemon.go
            symbol: runIdleMonitor
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: Name
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: RemoveServe
        - to:
            package: internal/worktree
            file: worktree.go
            symbol: WriteServe
typedefs:
    - name: EventHandler
      underlying_type:
        name: func(paths []string)
      exported: true
      source_file: watcher.go
      doc: |
        EventHandler is invoked for each flushed batch of file paths. The
        Watcher calls it serially; the handler itself is responsible for any
        further concurrency.
    - name: StateLoader
      underlying_type:
        name: func(ctx context.Context, name string, path string) (*internal/serve.State, error)
      exported: true
      source_file: multistate.go
      doc: |
        StateLoader builds a fresh State for a newly-discovered worktree.
        It is invoked the first time a worktree's State is requested from a
        MultiState; subsequent requests hit the per-worktree cache. The
        default production loader is DefaultStateLoader, which calls
        NewState(path).Load(ctx).
    - name: WatcherHook
      underlying_type:
        name: func(ctx context.Context, name string, state *internal/serve.State) (io.Closer, error)
      exported: true
      source_file: multistate.go
      doc: |
        WatcherHook is invoked by MultiState the first time a worktree's
        State is loaded. Implementations typically spin up a per-worktree
        fsnotify watcher whose handler re-extracts the loaded State on file
        changes. The returned io.Closer is tracked by MultiState and closed
        when the worktree is dropped from a Refresh or when Close is called.
        A nil hook disables per-worktree watching (used by lightweight tests
        and by callers that prefer manual refreshes).
