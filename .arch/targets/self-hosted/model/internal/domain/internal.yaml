        package: internal/domain
        file: call.go
        symbol: CallEdge
      to:
        package: internal/domain
        file: dependency.go
        symbol: SymbolRef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: const.go
        symbol: ConstDef
      to:
        package: internal/domain
        file: method.go
        symbol: TypeRef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: dependency.go
        symbol: Dependency
      to:
        package: internal/domain
        file: dependency.go
        symbol: SymbolRef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: dependency.go
        symbol: Dependency
      to:
        package: internal/domain
        file: dependency.go
        symbol: DependencyKind
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: field.go
        symbol: FieldDef
      to:
        package: internal/domain
        file: method.go
        symbol: TypeRef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: function.go
        symbol: FunctionDef
      to:
        package: internal/domain
        file: method.go
        symbol: ParamDef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: function.go
        symbol: FunctionDef
      to:
        package: internal/domain
        file: method.go
        symbol: TypeRef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: function.go
        symbol: FunctionDef
      to:
        package: internal/domain
        file: stereotype.go
        symbol: Stereotype
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: function.go
        symbol: FunctionDef
      to:
        package: internal/domain
        file: call.go
        symbol: CallEdge
      kind: uses
      through_exported: true
    - from:
