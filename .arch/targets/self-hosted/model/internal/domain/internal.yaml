        file: method.go
        symbol: MethodDef
      to:
        package: internal/domain
        file: method.go
        symbol: ParamDef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: method.go
        symbol: MethodDef
      to:
        package: internal/domain
        file: method.go
        symbol: TypeRef
      kind: uses
      through_exported: true
    - from:
        package: internal/domain
        file: method.go
        symbol: MethodDef
      to:
        package: internal/domain
        file: call.go
