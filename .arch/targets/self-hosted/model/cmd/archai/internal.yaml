          type:
            name: string
      returns:
        - name: string
      exported: false
      source_file: main.go
      doc: |
        trimModulePrefix returns pkgPath with the module prefix stripped, or
        pkgPath unchanged if the prefix does not apply.
    - name: validatePatch
      params:
        - name: d
          type:
            name: Diff
            package: internal/diff
            pointer: true
      returns:
        - name: error
      exported: false
      source_file: main.go
      doc: |
        validatePatch ensures every Change in d carries a recognized Op and Kind
        so we fail fast on malformed patches before any on-disk writes.
    - name: violationCount
      params:
        - name: violations
          type:
            name: Violation
            package: internal/overlay
            slice: true
      returns:
        - name: int
      exported: false
      source_file: main.go
      doc: |
        violationCount sums the forbidden-import entries across all Violation records.
    - name: writeTargetModels
      params:
        - name: ctx
          type:
            name: Context
            package: context
        - name: projectRoot
          type:
            name: string
        - name: id
          type:
            name: string
        - name: models
          type:
            name: PackageModel
            package: internal/domain
            slice: true
      returns:
        - name: error
      exported: false
      source_file: main.go
      doc: |
        writeTargetModels overwrites the target snapshot's model/ tree with the
        given per-package models. Existing package YAML files are replaced; the
        internal.yaml per package is regenerated (pub.yaml is redundant with
        internal.yaml for the full model and is left absent to avoid drift
        between the two on subsequent diffs — the YAML reader accepts either).
      calls:
        - to:
            package: internal/adapter/d2
            file: writer.go
            symbol: writer.Write
          via: internal/service.ModelWriter
        - to:
            package: internal/adapter/yaml
            file: writer.go
            symbol: NewWriter
        - to:
            package: internal/adapter/yaml
            file: writer.go
            symbol: writer.Write
          via: internal/service.ModelWriter
variables:
    - name: Version
      type:
        name: string
      exported: true
      source_file: version.go
      doc: |
        Version is the archai binary version. Defaults to "dev" for
        unversioned builds and is overridden at build time via ldflags:

        	go build -ldflags "-X main.Version=v0.1.0" ./cmd/archai

        When Version is still "dev" at runtime we fall back to debug.ReadBuildInfo
        so `go install` / `go run` users get a meaningful version when available.
