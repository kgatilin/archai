    - name: streamExtract
      params:
        - name: w
          type:
            name: Writer
            package: io
        - name: models
          type:
            name: PackageModel
            package: internal/domain
            slice: true
        - name: format
          type:
            name: string
      returns:
        - name: error
      exported: false
      source_file: extract.go
      doc: |
        streamExtract writes every package document to w.

        YAML: one document per package, separated by the standard "---\n"
        delimiter.

        JSON: a single JSON array containing every package document (so the
        whole stream is still valid JSON).
      calls:
        - to:
            package: internal/adapter/yaml
