<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>archai · hi-fi mockups</title>
<link rel="stylesheet" href="hifi-tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0d1117; height: 100%; }
  body { font-family: 'Inter', sans-serif; }
  .frame {
    background: #0d1117;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .frame-light { background: #ffffff; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- reuse low-fi scenario -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="hifi-shared.jsx"></script>
<script type="text/babel" src="hifi-variants.jsx"></script>
<script type="text/babel" src="hifi-v4.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "diff": true,
    "bc": true,
    "flow": true,
    "theme": "dark"
  }/*EDITMODE-END*/;

  function App() {
    const tweaks = TWEAKS;
    return (
      <DesignCanvas>
        <DCSection id="merged" title="archai · V4 (merged)" subtitle="V2 grid + V3 changes-first + collapsible panels + inline comments. Click any element to comment.">
          <DCArtboard id="v4" label="V4 · merged direction" width={1500} height={900}>
            <div className="frame" style={{width: '100%', height: '100%'}}>
              <HFV4 tweaks={tweaks} />
            </div>
          </DCArtboard>
        </DCSection>
        <DCSection id="hifi" title="archai · earlier hi-fi directions" subtitle="V1–V3 retained for reference.">
          <DCArtboard id="v1" label="V1 · IDE classic — left tree, right inspector" width={1400} height={820}>
            <div className="frame" style={{width: '100%', height: '100%'}}>
              <HFV1 tweaks={tweaks} />
            </div>
          </DCArtboard>
          <DCArtboard id="v2" label="V2 · Canvas focus — full-bleed graph, floating panel" width={1400} height={820}>
            <div className="frame" style={{width: '100%', height: '100%'}}>
              <HFV2 tweaks={tweaks} />
            </div>
          </DCArtboard>
          <DCArtboard id="v3" label="V3 · Review-first — change list dominant, canvas as preview" width={1400} height={820}>
            <div className="frame" style={{width: '100%', height: '100%'}}>
              <HFV3 tweaks={tweaks} />
            </div>
          </DCArtboard>
          <DCArtboard id="v1l" label="V1 · light theme" width={1400} height={820}>
            <div className="frame frame-light" style={{width: '100%', height: '100%'}}>
              <HFV1 tweaks={{...tweaks, theme: 'light'}} />
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
